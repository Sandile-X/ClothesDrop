<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Product | Clothes Drop</title>
  <meta name="description" content="Shop this piece from Clothes Drop — stylish, good-quality everyday drip." />
  <link rel="icon" href="images/logo.jpg" type="image/jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/shop.css" />
  <link rel="stylesheet" href="css/cart.css" />
</head>
<body>

  <!-- Header -->
  <header class="site-header" id="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">
        <img src="images/logo.jpg" alt="Clothes Drop logo" class="brand-logo" />
        <span class="brand-name">Clothes Drop</span>
      </a>

      <nav class="main-nav" id="main-nav">
        <a href="shop.html">Shop</a>
        <a href="index.html#about">About</a>
        <a href="index.html#why-us">Why Us</a>
        <a href="index.html#contact">Contact</a>
      </nav>

      <button class="cart-icon-btn" id="cart-icon-btn" aria-label="Open cart">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" />
          <path d="M3 6h18" />
          <path d="M16 10a4 4 0 0 1-8 0" />
        </svg>
        <span class="cart-badge" id="cart-count">0</span>
      </button>

      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <section class="product-detail">
    <div class="container">
      <p class="breadcrumb"><a href="shop.html">Shop</a> / <span id="breadcrumb-name">Product</span></p>

      <div id="product-detail-root">
        <!-- rendered by js/product.js -->
      </div>

      <div class="related-section" id="related-section" style="display:none;">
        <h2>You Might Also Like</h2>
        <div class="product-grid" id="related-grid"></div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; <span id="year"></span> Clothes Drop by Mihlali. All rights reserved.</p>
      <div class="footer-links">
        <a href="https://www.facebook.com/share/18o5NTKCzX" target="_blank" rel="noopener">Facebook</a>
        <a href="https://www.instagram.com/mihlali.sikroba" target="_blank" rel="noopener">Instagram</a>
        <a href="mailto:sikrobam@gmail.com">Email</a>
      </div>
    </div>
  </footer>

  <a href="https://wa.me/27782120124" target="_blank" rel="noopener" class="whatsapp-fab" aria-label="Chat on WhatsApp">&#128172;</a>

  <!-- Cart drawer -->
  <div class="cart-overlay" id="cart-overlay"></div>
  <aside class="cart-drawer" id="cart-drawer">
    <div class="cart-drawer-header">
      <h3>Your Cart</h3>
      <button id="cart-drawer-close" aria-label="Close cart">&times;</button>
    </div>
    <div class="cart-drawer-items" id="cart-drawer-items"></div>
    <div class="cart-drawer-footer">
      <div class="cart-drawer-subtotal">
        <span>Subtotal</span>
        <span id="cart-drawer-subtotal">R0</span>
      </div>
      <a href="cart.html" class="btn btn-gold cart-drawer-checkout">View Cart &amp; Checkout</a>
    </div>
  </aside>

  <div class="toast" id="toast"></div>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/script.js"></script>
  <script src="js/product.js"></script>
</body>
</html>
